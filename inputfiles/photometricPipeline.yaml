Offset:
    IncludeOutlierDetection:             True
    OutlierDetection:
        k:                               10

Smearing:
    Coefficients:
        a:                               [101.3463, 0.9695, 4.6004, 5.9211]   # [a0, a1, a2, a3]
        b:                               [2.1641, 0.2750, 0.0218, 0.0039]     # [b0, b1, b2, b3]
    NumRowsSkipped:                      10
    Regularization:                      0.01
    IncludeOutlierDetection:             True
    OutlierDetection:
        Threshold:                       2

StarWindows:
    TargetIds:                          [1]
    ContaminationRadius:                 4      # Radius around target inside which other stars contribute to the contamination [pixels]
    #ZeroPointRow:                        100    # Row coordinate of the pixel of the star window on the CCD closest to its origin [pixels]
    #ZeroPointColumn:                     100    # Column coordinate of the pixel of the star window on the CCD closest to its origin [pixels]
    WindowDimension:                     7      # Number of rows/columns in the star windows [pixels] (must be odd)
    MaskUpdateInterval:                  7      # Number of days after which to update the mask [days]

#BackgroundWindow:
#    OutlierDetection:
#        Enabled:                         True
#        Threshold:                       5

LightCurve:
    IncludeOutlierDetection:             True
    OutlierDetection:
        b:                               10
        Threshold:                       5
    TimeAveraging:        
        Cadence:                         Long     # "Short" (50s) or "Long" (600s)
        NumSamples:
          Short:                         2        # Short cadence: 50s (i.e. 2 samples)
          Long:                          24       # Long cadence: 600s (i.e. 24 samples)
